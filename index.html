<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CityWatch Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body {
  margin:0;
  font-family: sans-serif;
}

#map {
  height: 100vh;
  width: 100vw;
}

/* =========================
   ISSUE PANEL
========================= */

.issue-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  padding: 15px;
  transform: translateY(100%);
  transition: 0.3s;
  z-index: 1000;
  border-radius: 16px 16px 0 0;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
}

.issue-panel.active {
  transform: translateY(0);
}

.type-grid {
  display: grid;
  grid-template-columns: repeat(5,1fr);
  gap: 8px;
}

.type-btn {
  padding: 8px;
  border: 2px solid #ddd;
  border-radius: 10px;
  background: white;
  cursor: pointer;
  font-size: 11px;
  text-align: center;
}

.type-btn.selected {
  border-color: #007bff;
  background: #e8f0ff;
}

/* =========================
   EMOJI MARKERS
========================= */

.emoji-marker {
  background: transparent;
  border: none;
}

.emoji-pin {
  width: 42px;
  height: 42px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: 24px;
  background:white;
  border-radius:50%;
  border:2px solid white;
  box-shadow:0 4px 14px rgba(0,0,0,0.2);
  transform: translateY(-8px);
}

/* =========================
   USER MARKER
========================= */

.user-marker {
  background: transparent;
  border: none;
}

.user-wrapper {
  position: relative;
  width: 42px;
  height: 42px;
}

.user-dot {
  position:absolute;
  width:16px;
  height:16px;
  background:#1e88ff;
  border-radius:50%;
  left:13px;
  top:13px;
  border:3px solid white;
}

.user-pulse {
  position:absolute;
  width:16px;
  height:16px;
  left:13px;
  top:13px;
  background: rgba(30,136,255,0.3);
  border-radius:50%;
  animation: pulse 2s infinite;
}

.user-arrow {
  position:absolute;
  width:0;
  height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:22px solid #1e88ff;
  top:-2px;
  left:11px;
  transform-origin: center 24px;
}

@keyframes pulse {
  0% {transform:scale(1); opacity:0.5;}
  70% {transform:scale(3); opacity:0;}
  100% {opacity:0;}
}

</style>
</head>

<body>

<div id="map"></div>

<div class="issue-panel" id="panel">

  <div class="type-grid">

    <div class="type-btn" data-type="Pothole">🕳️</div>
    <div class="type-btn" data-type="Trash">🗑️</div>
    <div class="type-btn" data-type="Leak">💧</div>
    <div class="type-btn" data-type="Light">💡</div>
    <div class="type-btn" data-type="Other">⚠️</div>

  </div>

  <input id="desc" placeholder="Describe issue..." />

  <button id="submitBtn">Submit</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import {
  initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* =========================
   FIREBASE
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyBT8j239aELPwxD0iQcQj6fdnhQVHNuMLU",
  authDomain: "community-map-125ba.firebaseapp.com",
  projectId: "community-map-125ba",
  storageBucket: "community-map-125ba.firebasestorage.app",
  messagingSenderId:"1016337399487",
  appId: "1:1016337399487:web:77ba8a7b8c89fd850fd00a",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const reportsRef = collection(db,"reports");

/* =========================
   MAP
========================= */

const map = L.map("map").setView([-26.2,28.0],14);

L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map);

/* =========================
   EMOJI ICONS
========================= */

function icon(e){
  return L.divIcon({
    className:"emoji-marker",
    html:`<div class="emoji-pin">${e}</div>`,
    iconSize:[42,42],
    iconAnchor:[21,42]
  });
}

const icons = {
  Pothole: icon("🕳️"),
  Trash: icon("🗑️"),
  Leak: icon("💧"),
  Light: icon("💡"),
  Other: icon("⚠️")
};

/* =========================
   USER MARKER
========================= */

let userMarker;
let accuracyCircle;
let follow = true;

const userIcon = L.divIcon({
  className:"user-marker",
  html:`
    <div class="user-wrapper">
      <div class="user-pulse"></div>
      <div class="user-arrow"></div>
      <div class="user-dot"></div>
    </div>
  `,
  iconSize:[42,42]
});

function rotateArrow(angle){
  if(!userMarker) return;
  const el = userMarker.getElement();
  if(!el) return;
  const arrow = el.querySelector(".user-arrow");
  if(arrow) arrow.style.transform = `rotate(${angle}deg)`;
}

function moveSmooth(marker,latlng){
  const start = marker.getLatLng();
  const startTime = performance.now();

  function animate(t){
    const p = Math.min((t-startTime)/800,1);

    const lat = start.lat + (latlng.lat-start.lat)*p;
    const lng = start.lng + (latlng.lng-start.lng)*p;

    marker.setLatLng([lat,lng]);

    if(p<1) requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
}

function startTracking(){

  navigator.geolocation.watchPosition(pos=>{

    const {latitude,longitude,accuracy,heading} = pos.coords;

    const latlng = L.latLng(latitude,longitude);

    if(!userMarker){

      userMarker = L.marker(latlng,{icon:userIcon}).addTo(map);

      accuracyCircle = L.circle(latlng,{
        radius:accuracy,
        color:"#1e88ff",
        fillOpacity:0.1
      }).addTo(map);

    } else {

      moveSmooth(userMarker,latlng);
      accuracyCircle.setLatLng(latlng);
      accuracyCircle.setRadius(accuracy);

    }

    if(heading !== null){
      rotateArrow(heading);
    }

    if(follow){
      map.setView(latlng,map.getZoom(),{animate:true});
    }

  },console.error,{
    enableHighAccuracy:true
  });

}

startTracking();

map.on("dragstart",()=>follow=false);

/* =========================
   REPORTS
========================= */

let selected="Other";
let point=null;

map.on("click",e=>{
  point=e.latlng;
  document.getElementById("panel").classList.add("active");
});

document.querySelectorAll(".type-btn").forEach(b=>{
  b.onclick=()=>{
    selected=b.dataset.type;
  };
});

document.getElementById("submitBtn").onclick=async()=>{

  const desc=document.getElementById("desc").value;

  await addDoc(reportsRef,{
    type:selected,
    description:desc,
    lat:point.lat,
    lng:point.lng
  });

  document.getElementById("panel").classList.remove("active");

};

/* =========================
   SHOW REPORTS
========================= */

onSnapshot(reportsRef,snap=>{

  snap.forEach(docu=>{

    const d=docu.data();

    L.marker([d.lat,d.lng],{
      icon:icons[d.type]
    }).addTo(map)
    .bindPopup(`${d.type}<br>${d.description}`);

  });

});

</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Community Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body { margin:0; font-family:sans-serif; }
    #map { height:100vh; }

    /* ── ISSUE PANEL ── */
    .issue-panel {
      position: fixed;
      bottom:0; left:0; right:0;
      background:white;
      padding:15px;
      transform: translateY(100%);
      transition:0.3s;
      z-index:1000;
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    }
    .issue-panel.active { transform: translateY(0); }
    .issue-panel h3 { margin: 0 0 12px; font-size: 15px; color: #333; }

    .type-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .type-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 4px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-size: 11px;
      color: #555;
      transition: 0.15s;
    }
    .type-btn span.icon { font-size: 22px; }
    .type-btn:hover { border-color: #007bff; color: #007bff; }
    .type-btn.selected { border-color: #007bff; background: #e8f0fe; color: #007bff; font-weight: 600; }

    .issue-panel input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    /* ── PHOTO UPLOAD ── */
    .photo-area { margin-bottom: 10px; }
    .photo-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 2px dashed #ccc;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      color: #666;
      transition: 0.15s;
    }
    .photo-label:hover { border-color: #007bff; color: #007bff; }
    .photo-label span.cam { font-size: 20px; }
    #photoInput { display: none; }

    #photoPreview {
      display: none;
      position: relative;
      margin-top: 8px;
    }
    #photoPreview img {
      width: 100%;
      max-height: 160px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #eee;
    }
    #removePhoto {
      position: absolute;
      top: 6px; right: 6px;
      background: rgba(0,0,0,0.55);
      color: white;
      border: none;
      border-radius: 50%;
      width: 26px; height: 26px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel-actions { display: flex; gap: 8px; }
    .panel-actions button {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    #submitBtn { background: #007bff; color: white; font-weight: 600; }
    #cancelBtn { background: #f0f0f0; color: #555; }

    /* ── LOCATE BUTTON ── */
    .locate-btn {
      position: fixed;
      top: 15px; left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* ── MENU BUTTON ── */
    .menu-btn {
      position: fixed;
      top: 15px; left: 15px;
      z-index: 1001;
      background: white;
      border: none;
      font-size: 22px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      line-height: 1;
    }

    /* ── SIDE MENU ── */
    .menu {
      position: fixed;
      top: 0; left: -260px;
      width: 250px; height: 100%;
      background: white;
      box-shadow: 2px 0 16px rgba(0,0,0,0.18);
      transition: 0.3s ease;
      z-index: 1002;
      padding: 28px 20px 20px;
      box-sizing: border-box;
    }
    .menu.open { left: 0; }
    .menu h3 { margin: 0 0 4px; font-size: 18px; color: #007bff; }
    .menu p.subtitle { margin: 0 0 16px; font-size: 13px; color: #888; }
    .menu hr { border: none; border-top: 1px solid #eee; margin: 16px 0; }
    .menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 8px; border-radius: 8px;
      font-size: 14px; color: #444; cursor: pointer;
    }
    .menu-item:hover { background: #f5f5f5; }
    .menu-item span.mi { font-size: 18px; }
    .coming-soon { font-size: 12px; color: #aaa; padding: 6px 8px; }
    .menu-overlay {
      display: none;
      position: fixed; inset: 0;
      z-index: 1001; background: transparent;
    }
    .menu-overlay.show { display: block; }

    /* ── FULL-SCREEN PHOTO VIEWER ── */
    .photo-viewer {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .photo-viewer.open { display: flex; }
    .photo-viewer img {
      max-width: 95vw;
      max-height: 85vh;
      border-radius: 10px;
      object-fit: contain;
      box-shadow: 0 4px 40px rgba(0,0,0,0.5);
    }
    .photo-viewer-close {
      position: absolute;
      top: 18px; right: 18px;
      background: rgba(255,255,255,0.15);
      border: none; color: white;
      font-size: 24px;
      width: 44px; height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-viewer-close:hover { background: rgba(255,255,255,0.28); }

    /* popup photo styles */
    .popup-thumb {
      width: 100%;
      max-height: 90px;
      object-fit: cover;
      border-radius: 6px;
      margin-top: 6px;
      cursor: pointer;
      display: block;
    }
    .popup-photo-btn {
      display: inline-block;
      margin-top: 5px;
      padding: 5px 10px;
      background: #007bff;
      color: white !important;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div id="map"></div>
<button class="locate-btn" id="locateBtn">📍 Find My Location</button>
<button class="menu-btn" id="menuBtn">☰</button>
<div class="menu-overlay" id="menuOverlay"></div>

<!-- Side menu -->
<div class="menu" id="menu">
  <h3>🗺️ CityWatch</h3>
  <p class="subtitle">Community Issue Map</p>
  <hr>
  <div class="menu-item"><span class="mi">📍</span> Report an Issue</div>
  <div class="menu-item"><span class="mi">📊</span> Stats <span style="margin-left:auto;font-size:11px;color:#aaa;">soon</span></div>
  <div class="menu-item"><span class="mi">🎛️</span> Filter by Type <span style="margin-left:auto;font-size:11px;color:#aaa;">soon</span></div>
  <div class="menu-item"><span class="mi">✅</span> Mark Resolved <span style="margin-left:auto;font-size:11px;color:#aaa;">soon</span></div>
  <hr>
  <div class="coming-soon">More features coming soon...</div>
</div>

<!-- Issue report panel -->
<div class="issue-panel" id="panel">
  <h3>📌 Report an Issue</h3>
  <div class="type-grid">
    <button class="type-btn" data-type="Pothole"><span class="icon">🕳️</span> Pothole</button>
    <button class="type-btn" data-type="Trash"><span class="icon">🗑️</span> Trash</button>
    <button class="type-btn" data-type="Leak"><span class="icon">💧</span> Leak</button>
    <button class="type-btn" data-type="Light"><span class="icon">💡</span> Light</button>
    <button class="type-btn" data-type="Other"><span class="icon">⚠️</span> Other</button>
  </div>

  <input type="text" id="desc" placeholder="Describe the issue..."/>

  <div class="photo-area">
    <label class="photo-label" for="photoInput">
      <span class="cam">📷</span> Take / Upload a Photo
      <span style="margin-left:auto;font-size:11px;color:#aaa;">optional</span>
    </label>
    <input type="file" id="photoInput" accept="image/*" capture="environment"/>
    <div id="photoPreview">
      <img id="previewImg" src="" alt="preview"/>
      <button id="removePhoto" title="Remove">✕</button>
    </div>
  </div>

  <div class="panel-actions">
    <button id="cancelBtn">Cancel</button>
    <button id="submitBtn">Submit Report</button>
  </div>
</div>

<!-- Full-screen photo viewer -->
<div class="photo-viewer" id="photoViewer">
  <button class="photo-viewer-close" id="closeViewer">✕</button>
  <img id="viewerImg" src="" alt="Issue photo"/>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-rotatedmarker/leaflet.rotatedMarker.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

// 🔥 Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBT8j239aELPwxD0iQcQj6fdnhQVHNuMLU",
    authDomain: "community-map-125ba.firebaseapp.com",
    projectId: "community-map-125ba",
    appId: "1:1016337399487:web:77ba8a7b8c89fd850fd00a"
  };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const reportsRef = collection(db, "reports");

// 🗺️ MAP
const map = L.map('map').setView([-26.2041, 28.0473], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// 🎯 CUSTOM ICONS
const icons = {
  "Pothole": L.icon({ iconUrl:"https://cdn-icons-png.flaticon.com/512/565/565547.png", iconSize:[35,35], iconAnchor:[17,35], popupAnchor:[0,-35] }),
  "Trash":   L.icon({ iconUrl:"https://cdn-icons-png.flaticon.com/512/484/484662.png", iconSize:[35,35], iconAnchor:[17,35], popupAnchor:[0,-35] }),
  "Leak":    L.icon({ iconUrl:"https://cdn-icons-png.flaticon.com/512/414/414974.png", iconSize:[35,35], iconAnchor:[17,35], popupAnchor:[0,-35] }),
  "Light":   L.icon({ iconUrl:"https://cdn-icons-png.flaticon.com/512/565/565654.png", iconSize:[35,35], iconAnchor:[17,35], popupAnchor:[0,-35] }),
  "Other":   L.icon({ iconUrl:"https://cdn-icons-png.flaticon.com/512/565/565491.png", iconSize:[35,35], iconAnchor:[17,35], popupAnchor:[0,-35] })
};

// 🖼️ PHOTO VIEWER
const photoViewer = document.getElementById("photoViewer");
const viewerImg   = document.getElementById("viewerImg");

function openPhotoViewer(src) {
  viewerImg.src = src;
  photoViewer.classList.add("open");
}
document.getElementById("closeViewer").onclick = () => {
  photoViewer.classList.remove("open");
  viewerImg.src = "";
};
photoViewer.addEventListener("click", (e) => {
  if (e.target === photoViewer) {
    photoViewer.classList.remove("open");
    viewerImg.src = "";
  }
});

// expose so popup onclick can call it
window.openPhotoViewer = openPhotoViewer;

// 📡 REAL-TIME REPORTS
onSnapshot(reportsRef, (snapshot) => {
  map.eachLayer(layer => {
    if (layer instanceof L.Marker && !layer.options.isUser) map.removeLayer(layer);
  });

  snapshot.forEach(doc => {
    const r = doc.data();

    let popupHtml = `<b>${r.type}</b><br>${r.description}`;

    if (r.photoUrl) {
      // escape for inline attribute safety (base64 is safe, but be explicit)
      const safeSrc = r.photoUrl.startsWith("data:image") ? r.photoUrl : "";
      if (safeSrc) {
        popupHtml += `
          <img class="popup-thumb" src="${safeSrc}"
               onclick="openPhotoViewer(this.src)"
               title="Tap to view full photo"/>
          <a class="popup-photo-btn" onclick="openPhotoViewer('${safeSrc}')">🖼️ Open Photo</a>`;
      }
    }

    L.marker([r.lat, r.lng], { icon: icons[r.type] || icons["Other"] })
      .addTo(map)
      .bindPopup(popupHtml, { maxWidth: 220 });
  });
});

// 📍 USER TRACKING
let userMarker = null;
let heading = 0;
const arrowIcon = L.icon({
  iconUrl: "https://cdn-icons-png.flaticon.com/512/684/684908.png",
  iconSize: [40,40], iconAnchor:[20,20]
});

function startTracking() {
  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission();
  }
  navigator.geolocation.watchPosition(
    pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      if (!userMarker) {
        userMarker = L.marker([lat, lng], { icon: arrowIcon, rotationAngle: heading, isUser: true }).addTo(map);
      } else {
        userMarker.setLatLng([lat, lng]);
      }
      map.setView([lat, lng], 17);
    },
    err => alert(err.message),
    { enableHighAccuracy: true, maximumAge: 0 }
  );
}

window.addEventListener("deviceorientationabsolute", (event) => {
  if (event.alpha !== null && userMarker) {
    heading = event.alpha;
    userMarker.setRotationAngle(heading);
  }
});

document.getElementById("locateBtn").onclick = startTracking;

// 🍔 MENU
const menu = document.getElementById("menu");
const menuOverlay = document.getElementById("menuOverlay");
document.getElementById("menuBtn").onclick = () => {
  menu.classList.toggle("open");
  menuOverlay.classList.toggle("show");
};
menuOverlay.onclick = () => {
  menu.classList.remove("open");
  menuOverlay.classList.remove("show");
};

// 📷 PHOTO LOGIC
let photoBase64 = null;
const photoInput   = document.getElementById("photoInput");
const photoPreview = document.getElementById("photoPreview");
const previewImg   = document.getElementById("previewImg");

photoInput.onchange = () => {
  const file = photoInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      // Resize to max 800px wide/tall, compress to ~75% JPEG
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      else if (h > MAX)     { w = Math.round(w * MAX / h); h = MAX; }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      photoBase64 = canvas.toDataURL("image/jpeg", 0.75);
      previewImg.src = photoBase64;
      photoPreview.style.display = "block";
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
};

document.getElementById("removePhoto").onclick = () => {
  photoBase64 = null;
  photoInput.value = "";
  previewImg.src = "";
  photoPreview.style.display = "none";
};

// 📌 REPORT SYSTEM
let pendingLocation = null;
let selectedType = "Other";

document.querySelectorAll(".type-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedType = btn.dataset.type;
  };
});

map.on("click", e => {
  pendingLocation = e.latlng;
  document.getElementById("panel").classList.add("active");
  document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("selected"));
  selectedType = "Other";
  document.getElementById("desc").value = "";
  // reset photo
  photoBase64 = null;
  photoInput.value = "";
  previewImg.src = "";
  photoPreview.style.display = "none";
});

document.getElementById("cancelBtn").onclick = () => {
  document.getElementById("panel").classList.remove("active");
  pendingLocation = null;
};

document.getElementById("submitBtn").onclick = async () => {
  const desc = document.getElementById("desc").value.trim();
  if (!desc || !pendingLocation) {
    alert("Please describe the issue.");
    return;
  }
  const btn = document.getElementById("submitBtn");
  btn.textContent = "Submitting...";
  btn.disabled = true;

  await addDoc(reportsRef, {
    type: selectedType,
    description: desc,
    lat: pendingLocation.lat,
    lng: pendingLocation.lng,
    photoUrl: photoBase64 || null,
    timestamp: new Date().toISOString()
  });

  btn.textContent = "Submit Report";
  btn.disabled = false;
  document.getElementById("panel").classList.remove("active");
  pendingLocation = null;
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <title>CityWatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow:hidden; }
    #map { height:100vh; width:100vw; }

    /* ── LOCATE BUTTON ── */
    .locate-btn {
      position: fixed;
      top: 15px; left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: #007bff; color: white;
      border: none; padding: 10px 18px;
      border-radius: 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .locate-btn:active { background: #0056b3; }

    /* ── MENU BUTTON ── */
    .menu-btn {
      position: fixed; top: 15px; left: 15px;
      z-index: 1001; background: white; border: none;
      font-size: 22px; padding: 8px 12px; border-radius: 8px;
      cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.15); line-height: 1;
    }

    /* ── SIDE MENU ── */
    .menu {
      position: fixed; top: 0; left: -260px;
      width: 250px; height: 100%; background: white;
      box-shadow: 2px 0 16px rgba(0,0,0,0.18);
      transition: 0.3s ease; z-index: 1002;
      padding: 28px 20px 20px;
    }
    .menu.open { left: 0; }
    .menu h3 { margin: 0 0 4px; font-size: 18px; color: #007bff; }
    .menu p.subtitle { margin: 0 0 16px; font-size: 13px; color: #888; }
    .menu hr { border: none; border-top: 1px solid #eee; margin: 16px 0; }
    .menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 8px; border-radius: 8px;
      font-size: 14px; color: #444; cursor: pointer;
    }
    .menu-item:hover { background: #f5f5f5; }
    .menu-item span.mi { font-size: 18px; }
    .coming-soon { font-size: 12px; color: #aaa; padding: 6px 8px; }
    .menu-overlay {
      display: none; position: fixed; inset: 0;
      z-index: 1001; background: transparent;
    }
    .menu-overlay.show { display: block; }

    /* ── ISSUE PANEL ── */
    .issue-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; padding: 20px 16px 34px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 1000; border-radius: 20px 20px 0 0;
      box-shadow: 0 -6px 30px rgba(0,0,0,0.15);
      max-height: 88vh; overflow-y: auto;
    }
    .issue-panel.active { transform: translateY(0); }
    .panel-handle {
      width: 40px; height: 4px; background: #ddd;
      border-radius: 2px; margin: 0 auto 14px;
    }
    .issue-panel h3 { margin: 0 0 14px; font-size: 16px; font-weight: 700; color: #111; }

    .type-grid {
      display: grid; grid-template-columns: repeat(5,1fr);
      gap: 8px; margin-bottom: 14px;
    }
    .type-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; padding: 10px 4px;
      border: 2px solid #e0e0e0; border-radius: 12px;
      background: white; cursor: pointer; font-size: 11px; color: #555;
      transition: 0.15s;
    }
    .type-btn span.icon { font-size: 24px; line-height: 1; }
    .type-btn:hover { border-color: #007bff; color: #007bff; }
    .type-btn.selected { border-color: #007bff; background: #e8f0fe; color: #007bff; font-weight: 600; }

    .issue-panel textarea {
      width: 100%; padding: 11px 13px;
      border: 2px solid #e0e0e0; border-radius: 10px;
      font-size: 14px; font-family: inherit;
      margin-bottom: 12px; resize: none; outline: none;
      transition: border-color 0.15s;
    }
    .issue-panel textarea:focus { border-color: #007bff; }

    /* Photo */
    .photo-area { margin-bottom: 12px; }
    .photo-label {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 14px; border: 2px dashed #ccc;
      border-radius: 10px; cursor: pointer; font-size: 13px; color: #666;
      transition: 0.15s;
    }
    .photo-label:hover { border-color: #007bff; color: #007bff; }
    .photo-label span.cam { font-size: 20px; }
    #photoInput { display: none; }
    #photoPreview { display: none; position: relative; margin-top: 8px; }
    #photoPreview img {
      width: 100%; max-height: 160px; object-fit: cover;
      border-radius: 10px; border: 1px solid #eee;
    }
    #removePhoto {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,0.55); color: white; border: none;
      border-radius: 50%; width: 26px; height: 26px; font-size: 14px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    .panel-actions { display: flex; gap: 8px; }
    .panel-actions button {
      flex: 1; padding: 13px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    #submitBtn { background: #007bff; color: white; }
    #submitBtn:disabled { background: #93c5fd; cursor: not-allowed; }
    #cancelBtn { background: #f0f0f0; color: #555; }

    /* ── FULL-SCREEN PHOTO VIEWER ── */
    .photo-viewer {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.92); z-index: 2000;
      align-items: center; justify-content: center; flex-direction: column;
    }
    .photo-viewer.open { display: flex; }
    .photo-viewer img {
      max-width: 95vw; max-height: 85vh; border-radius: 10px;
      object-fit: contain; box-shadow: 0 4px 40px rgba(0,0,0,0.5);
    }
    .photo-viewer-close {
      position: absolute; top: 18px; right: 18px;
      background: rgba(255,255,255,0.15); border: none; color: white;
      font-size: 24px; width: 44px; height: 44px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .photo-viewer-close:hover { background: rgba(255,255,255,0.28); }
    .popup-thumb {
      width: 100%; max-height: 90px; object-fit: cover;
      border-radius: 6px; margin-top: 6px; cursor: pointer; display: block;
    }
    .popup-photo-btn {
      display: inline-block; margin-top: 5px; padding: 5px 10px;
      background: #007bff; color: white !important; border-radius: 6px;
      font-size: 12px; cursor: pointer; text-decoration: none;
    }

    /* ── USER LOCATION MARKER ── */
    .user-marker-wrap { position: relative; width: 48px; height: 48px; }
    .user-pulse {
      position: absolute; width: 20px; height: 20px;
      left: 14px; top: 14px;
      background: rgba(30,136,255,0.35); border-radius: 50%;
      animation: pulse 2s infinite;
    }
    /* Arrow tip points UP; transform-origin at dot centre */
    .user-arrow {
      position: absolute; width: 0; height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-bottom: 20px solid #1e88ff;
      top: -2px; left: 15px;
      transform-origin: 9px 26px;
      z-index: 3;
    }
    .user-dot {
      position: absolute; width: 18px; height: 18px;
      background: #1e88ff; border-radius: 50%;
      left: 15px; top: 15px;
      border: 3px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3); z-index: 2;
    }
    @keyframes pulse {
      0%  { transform:scale(1);   opacity:.5; }
      70% { transform:scale(3.4); opacity:0;  }
      100%{ opacity:0; }
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 96px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #111; color: white; padding: 10px 20px;
      border-radius: 999px; font-size: 13px; font-weight: 600;
      opacity: 0; transition: opacity .3s, transform .3s;
      z-index: 3000; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="map"></div>
<div class="toast" id="toast"></div>
<button class="locate-btn" id="locateBtn">📍 Find My Location</button>
<button class="menu-btn"   id="menuBtn">☰</button>
<div class="menu-overlay"  id="menuOverlay"></div>

<!-- Side menu -->
<div class="menu" id="menu">
  <h3>🗺️ CityWatch</h3>
  <p class="subtitle">Community Issue Map</p>
  <hr>
  <div class="menu-item"><span class="mi">📍</span> Report an Issue</div>
  <div class="menu-item"><span class="mi">📊</span> Stats <span style="margin-left:auto;font-size:11px;color:#aaa;">soon</span></div>
  <div class="menu-item"><span class="mi">🎛️</span> Filter by Type <span style="margin-left:auto;font-size:11px;color:#aaa;">soon</span></div>
  <div class="menu-item"><span class="mi">✅</span> Mark Resolved <span style="margin-left:auto;font-size:11px;color:#aaa;">soon</span></div>
  <hr>
  <div class="coming-soon">More features coming soon...</div>
</div>

<!-- Issue panel -->
<div class="issue-panel" id="panel">
  <div class="panel-handle"></div>
  <h3>📌 Report an Issue</h3>
  <div class="type-grid">
    <button class="type-btn" data-type="Pothole"><span class="icon">🕳️</span>Pothole</button>
    <button class="type-btn" data-type="Trash">  <span class="icon">🗑️</span>Trash</button>
    <button class="type-btn" data-type="Leak">   <span class="icon">💧</span>Leak</button>
    <button class="type-btn" data-type="Light">  <span class="icon">💡</span>Light</button>
    <button class="type-btn" data-type="Other">  <span class="icon">⚠️</span>Other</button>
  </div>
  <textarea id="desc" rows="3" placeholder="Describe the issue..."></textarea>
  <div class="photo-area">
    <label class="photo-label" for="photoInput">
      <span class="cam">📷</span> Take / Upload a Photo
      <span style="margin-left:auto;font-size:11px;color:#aaa;">optional</span>
    </label>
    <input type="file" id="photoInput" accept="image/*" capture="environment"/>
    <div id="photoPreview">
      <img id="previewImg" src="" alt="preview"/>
      <button id="removePhoto" title="Remove">✕</button>
    </div>
  </div>
  <div class="panel-actions">
    <button id="cancelBtn">Cancel</button>
    <button id="submitBtn">Submit Report</button>
  </div>
</div>

<!-- Full-screen photo viewer -->
<div class="photo-viewer" id="photoViewer">
  <button class="photo-viewer-close" id="closeViewer">✕</button>
  <img id="viewerImg" src="" alt="Issue photo"/>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* ── FIREBASE ── */
const firebaseConfig = {
  apiKey: "AIzaSyBT8j239aELPwxD0iQcQj6fdnhQVHNuMLU",
  authDomain: "community-map-125ba.firebaseapp.com",
  projectId: "community-map-125ba",
  storageBucket: "community-map-125ba.firebasestorage.app",
  messagingSenderId:"1016337399487",
  appId: "1:1016337399487:web:77ba8a7b8c89fd850fd00a",
};
const app        = initializeApp(firebaseConfig);
const db         = getFirestore(app);
const reportsRef = collection(db, "reports");

/* ── MAP ── */
const map = L.map("map", { zoomControl: false }).setView([-26.2041, 28.0473], 13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap contributors"
}).addTo(map);

/* ── FLATICON ICONS ── */
const icons = {
  Pothole: L.icon({ iconUrl:"https://cdn-icons-png.flaticon.com/512/565/565547.png", iconSize:[35,35], iconAnchor:[17,35], popupAnchor:[0,-35] }),
  Trash:   L.icon({ iconUrl:"https://cdn-icons-png.flaticon.com/512/484/484662.png", iconSize:[35,35], iconAnchor:[17,35], popupAnchor:[0,-35] }),
  Leak:    L.icon({ iconUrl:"https://cdn-icons-png.flaticon.com/512/414/414974.png", iconSize:[35,35], iconAnchor:[17,35], popupAnchor:[0,-35] }),
  Light:   L.icon({ iconUrl:"https://cdn-icons-png.flaticon.com/512/565/565654.png", iconSize:[35,35], iconAnchor:[17,35], popupAnchor:[0,-35] }),
  Other:   L.icon({ iconUrl:"https://cdn-icons-png.flaticon.com/512/565/565491.png", iconSize:[35,35], iconAnchor:[17,35], popupAnchor:[0,-35] })
};

/* ── PHOTO VIEWER ── */
const photoViewer = document.getElementById("photoViewer");
const viewerImg   = document.getElementById("viewerImg");
function openPhotoViewer(src) { viewerImg.src = src; photoViewer.classList.add("open"); }
document.getElementById("closeViewer").onclick = () => { photoViewer.classList.remove("open"); viewerImg.src = ""; };
photoViewer.onclick = e => { if (e.target === photoViewer) { photoViewer.classList.remove("open"); viewerImg.src = ""; } };
window.openPhotoViewer = openPhotoViewer;

/* ── REAL-TIME REPORTS ── */
const reportMarkers = {};
onSnapshot(reportsRef, snapshot => {
  snapshot.docChanges().forEach(change => {
    const id = change.doc.id;
    const r  = change.doc.data();
    if (change.type === "added") {
      let html = `<b>${r.type}</b><br>${r.description || ""}`;
      if (r.photoUrl) {
        html += `<img class="popup-thumb" src="${r.photoUrl}" onclick="openPhotoViewer(this.src)" title="Tap to view full photo"/>
                 <a class="popup-photo-btn" onclick="openPhotoViewer('${r.photoUrl}')">🖼️ Open Photo</a>`;
      }
      reportMarkers[id] = L.marker([r.lat, r.lng], { icon: icons[r.type] || icons.Other })
        .addTo(map).bindPopup(html, { maxWidth: 220 });
    }
    if (change.type === "removed" && reportMarkers[id]) {
      map.removeLayer(reportMarkers[id]); delete reportMarkers[id];
    }
  });
});

/* ══════════════════════════════════════════════
   USER LOCATION + COMPASS ARROW
   — pure CSS divIcon, no extra plugin needed —
══════════════════════════════════════════════ */
let userMarker     = null;
let accuracyCircle = null;
let compassHeading = null;
let isFollowing    = false;
let watchId        = null;

const userDivIcon = L.divIcon({
  className: "",
  html: `<div class="user-marker-wrap">
           <div class="user-pulse"></div>
           <div class="user-arrow"></div>
           <div class="user-dot"></div>
         </div>`,
  iconSize:   [48, 48],
  iconAnchor: [24, 24]
});

/* Rotate the CSS arrow inside the live Leaflet DOM element */
function setArrow(deg) {
  if (!userMarker) return;
  const el = userMarker.getElement();
  if (!el) return;
  const arrow = el.querySelector(".user-arrow");
  if (arrow) arrow.style.transform = `rotate(${deg}deg)`;
}

/* Smooth movement between GPS fixes */
function moveSmooth(marker, latlng) {
  const from = marker.getLatLng(), t0 = performance.now(), DUR = 700;
  (function step(now) {
    const p = Math.min((now - t0) / DUR, 1);
    marker.setLatLng([from.lat + (latlng.lat - from.lat) * p,
                      from.lng + (latlng.lng - from.lng) * p]);
    if (p < 1) requestAnimationFrame(step);
  })(t0);
}

/* ── COMPASS (device orientation) ──
   Works on Android immediately.
   On iOS 13+ permission is requested when user taps Locate. */
function startCompass() {
  const handler = e => {
    let h = null;
    if (e.webkitCompassHeading != null) {
      h = e.webkitCompassHeading;           // iOS Safari — already true north
    } else if (e.absolute && e.alpha != null) {
      h = (360 - e.alpha) % 360;            // Android absolute
    } else if (e.alpha != null) {
      h = (360 - e.alpha) % 360;            // non-absolute fallback
    }
    if (h !== null) { compassHeading = h; setArrow(h); }
  };
  // deviceorientationabsolute is more reliable on Android
  window.addEventListener("deviceorientationabsolute", handler, true);
  window.addEventListener("deviceorientation",         handler, true);
}

// Start compass immediately on Android / desktop; wait for gesture on iOS
if (typeof DeviceOrientationEvent !== "undefined" &&
    typeof DeviceOrientationEvent.requestPermission === "function") {
  // iOS — will request inside startTracking()
} else {
  startCompass();
}

/* ── GEOLOCATION WATCH ── */
function startTracking() {
  // iOS 13+ compass permission on user gesture
  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission()
      .then(s => { if (s === "granted") startCompass(); })
      .catch(() => {});
  }

  isFollowing = true;

  if (watchId !== null) {
    // Already watching — just re-centre
    if (userMarker) map.setView(userMarker.getLatLng(), 17, { animate: true });
    return;
  }

  if (!navigator.geolocation) { showToast("Geolocation not supported"); return; }

  watchId = navigator.geolocation.watchPosition(
    pos => {
      const { latitude: lat, longitude: lng, accuracy, heading: gpsHead } = pos.coords;
      const latlng = L.latLng(lat, lng);

      if (!userMarker) {
        userMarker = L.marker(latlng, { icon: userDivIcon, zIndexOffset: 1000 }).addTo(map);
        accuracyCircle = L.circle(latlng, {
          radius: accuracy, color: "#1e88ff", fillOpacity: 0.07, weight: 1
        }).addTo(map);
      } else {
        moveSmooth(userMarker, latlng);
        accuracyCircle.setLatLng(latlng);
        accuracyCircle.setRadius(accuracy);
      }

      // GPS course heading only if no compass data and actually moving
      if (compassHeading === null && gpsHead !== null && !isNaN(gpsHead)) {
        setArrow(gpsHead);
      }

      if (isFollowing) map.setView(latlng, 17, { animate: true });
    },
    err => showToast("Location error: " + err.message),
    { enableHighAccuracy: true, maximumAge: 0, timeout: 12000 }
  );
}

map.on("dragstart", () => { isFollowing = false; });
document.getElementById("locateBtn").onclick = startTracking;

/* ── MENU ── */
const menu = document.getElementById("menu");
const menuOverlay = document.getElementById("menuOverlay");
document.getElementById("menuBtn").onclick = () => {
  menu.classList.toggle("open"); menuOverlay.classList.toggle("show");
};
menuOverlay.onclick = () => {
  menu.classList.remove("open"); menuOverlay.classList.remove("show");
};

/* ── PHOTO LOGIC ── */
let photoBase64 = null;
const photoInput   = document.getElementById("photoInput");
const photoPreview = document.getElementById("photoPreview");
const previewImg   = document.getElementById("previewImg");

photoInput.onchange = () => {
  const file = photoInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      else if (h > MAX)     { w = Math.round(w * MAX / h); h = MAX; }
      const cv = document.createElement("canvas");
      cv.width = w; cv.height = h;
      cv.getContext("2d").drawImage(img, 0, 0, w, h);
      photoBase64 = cv.toDataURL("image/jpeg", 0.75);
      previewImg.src             = photoBase64;
      photoPreview.style.display = "block";
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
};

document.getElementById("removePhoto").onclick = () => {
  photoBase64 = null; photoInput.value = "";
  previewImg.src = ""; photoPreview.style.display = "none";
};

/* ── REPORT SYSTEM ── */
let pendingLocation = null;
let selectedType    = "Other";

document.querySelectorAll(".type-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedType = btn.dataset.type;
  };
});

map.on("click", e => {
  pendingLocation = e.latlng;
  document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("selected"));
  selectedType = "Other";
  document.getElementById("desc").value = "";
  photoBase64 = null; photoInput.value = ""; previewImg.src = "";
  photoPreview.style.display = "none";
  document.getElementById("panel").classList.add("active");
});

document.getElementById("cancelBtn").onclick = () => {
  document.getElementById("panel").classList.remove("active");
  pendingLocation = null;
};

document.getElementById("submitBtn").onclick = async () => {
  const desc = document.getElementById("desc").value.trim();
  if (!pendingLocation) return;
  if (!desc) { showToast("Please describe the issue."); return; }

  const btn = document.getElementById("submitBtn");
  btn.textContent = "Submitting…"; btn.disabled = true;

  try {
    await addDoc(reportsRef, {
      type:        selectedType,
      description: desc,
      lat:         pendingLocation.lat,
      lng:         pendingLocation.lng,
      photoUrl:    photoBase64 || null,
      timestamp:   new Date().toISOString()
    });
    document.getElementById("panel").classList.remove("active");
    pendingLocation = null;
    showToast("✅ Report submitted!");
  } catch (err) {
    console.error(err);
    showToast("❌ Submit failed — check Firebase config.");
  } finally {
    btn.textContent = "Submit Report"; btn.disabled = false;
  }
};

/* ── TOAST ── */
function showToast(msg, ms = 3000) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), ms);
}

</script>
</body>
</html>

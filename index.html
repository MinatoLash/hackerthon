<!DOCTYPE html>
<html>
<head>
  <title>CityWatch Community Map</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      overflow: hidden;
      background: #f5f5f5;
    }

    #map {
      height: 100vh;
      width: 100vw;
    }

    /* =========================
       TOP BUTTONS
    ========================== */

    .locate-btn {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;

      background: #007bff;
      color: white;

      border: none;
      border-radius: 24px;

      padding: 11px 18px;

      font-size: 14px;
      font-weight: 600;

      cursor: pointer;

      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    }

    .menu-btn {
      position: fixed;
      top: 15px;
      left: 15px;

      z-index: 1001;

      width: 46px;
      height: 46px;

      border: none;
      border-radius: 12px;

      background: white;

      font-size: 22px;

      cursor: pointer;

      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }

    /* =========================
       SIDE MENU
    ========================== */

    .menu {
      position: fixed;

      top: 0;
      left: -270px;

      width: 260px;
      height: 100%;

      background: white;

      z-index: 2000;

      transition: 0.3s ease;

      padding: 24px 18px;

      box-shadow: 4px 0 24px rgba(0,0,0,0.15);
    }

    .menu.open {
      left: 0;
    }

    .menu h2 {
      margin: 0;
      color: #007bff;
    }

    .menu p {
      color: #888;
      margin-top: 4px;
      font-size: 13px;
    }

    .menu hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 18px 0;
    }

    .menu-item {
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 6px;
      transition: 0.15s;
    }

    .menu-item:hover {
      background: #f4f4f4;
    }

    .menu-overlay {
      position: fixed;
      inset: 0;

      background: rgba(0,0,0,0.15);

      z-index: 1500;

      display: none;
    }

    .menu-overlay.show {
      display: block;
    }

    /* =========================
       ISSUE PANEL
    ========================== */

    .issue-panel {
      position: fixed;

      bottom: 0;
      left: 0;
      right: 0;

      background: white;

      z-index: 3000;

      border-radius: 18px 18px 0 0;

      padding: 16px;

      transform: translateY(110%);
      transition: 0.3s ease;

      box-shadow: 0 -6px 30px rgba(0,0,0,0.18);
    }

    .issue-panel.active {
      transform: translateY(0);
    }

    .issue-panel h3 {
      margin-top: 0;
      margin-bottom: 14px;
    }

    .type-grid {
      display: grid;
      grid-template-columns: repeat(5,1fr);
      gap: 8px;

      margin-bottom: 14px;
    }

    .type-btn {
      border: 2px solid #e5e5e5;
      background: white;

      border-radius: 12px;

      padding: 8px 4px;

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;

      cursor: pointer;

      transition: 0.15s;

      font-size: 11px;
    }

    .type-btn.selected {
      border-color: #007bff;
      background: #eaf3ff;
      color: #007bff;
      font-weight: 600;
    }

    .icon {
      font-size: 22px;
    }

    .issue-panel input {
      width: 100%;
      padding: 12px;

      border-radius: 10px;
      border: 1px solid #ddd;

      margin-bottom: 12px;

      font-size: 14px;
    }

    /* =========================
       PHOTO
    ========================== */

    .photo-label {
      display: flex;
      align-items: center;
      gap: 10px;

      padding: 12px;

      border: 2px dashed #ccc;
      border-radius: 12px;

      cursor: pointer;

      margin-bottom: 12px;
    }

    .photo-label:hover {
      border-color: #007bff;
      color: #007bff;
    }

    #photoInput {
      display: none;
    }

    #photoPreview {
      display: none;
      position: relative;
      margin-bottom: 12px;
    }

    #photoPreview img {
      width: 100%;
      max-height: 180px;

      object-fit: cover;

      border-radius: 12px;
    }

    #removePhoto {
      position: absolute;
      top: 8px;
      right: 8px;

      width: 28px;
      height: 28px;

      border: none;
      border-radius: 50%;

      background: rgba(0,0,0,0.6);

      color: white;

      cursor: pointer;
    }

    /* =========================
       ACTIONS
    ========================== */

    .panel-actions {
      display: flex;
      gap: 8px;
    }

    .panel-actions button {
      flex: 1;

      padding: 12px;

      border: none;
      border-radius: 10px;

      font-size: 14px;

      cursor: pointer;
    }

    #submitBtn {
      background: #007bff;
      color: white;
      font-weight: 600;
    }

    #cancelBtn {
      background: #efefef;
    }

    /* =========================
       USER MARKER
    ========================== */

    .user-arrow-wrapper {
      position: relative;
      width: 40px;
      height: 40px;
    }

    .user-arrow {
      width: 0;
      height: 0;

      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-bottom: 24px solid #007bff;

      position: absolute;
      left: 8px;
      top: 2px;

      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .user-pulse {
      position: absolute;

      width: 14px;
      height: 14px;

      background: #007bff;

      border-radius: 50%;

      bottom: 2px;
      left: 13px;

      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.4;
      }

      70% {
        transform: scale(2.5);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 0;
      }
    }

    /* =========================
       PHOTO VIEWER
    ========================== */

    .photo-viewer {
      display: none;

      position: fixed;
      inset: 0;

      background: rgba(0,0,0,0.92);

      z-index: 5000;

      align-items: center;
      justify-content: center;
    }

    .photo-viewer.open {
      display: flex;
    }

    .photo-viewer img {
      max-width: 94vw;
      max-height: 88vh;

      border-radius: 12px;
    }

    .photo-viewer-close {
      position: absolute;

      top: 16px;
      right: 16px;

      width: 44px;
      height: 44px;

      border-radius: 50%;
      border: none;

      background: rgba(255,255,255,0.18);

      color: white;

      font-size: 22px;

      cursor: pointer;
    }

    .popup-thumb {
      width: 100%;
      margin-top: 8px;

      border-radius: 8px;

      max-height: 100px;
      object-fit: cover;

      cursor: pointer;
    }

  </style>
</head>

<body>

<div id="map"></div>

<button class="locate-btn" id="locateBtn">
  📍 Find Me
</button>

<button class="menu-btn" id="menuBtn">
  ☰
</button>

<div class="menu-overlay" id="menuOverlay"></div>

<!-- MENU -->

<div class="menu" id="menu">

  <h2>🗺️ CityWatch</h2>
  <p>Community Issue Map</p>

  <hr>

  <div class="menu-item">📍 Report Issue</div>
  <div class="menu-item">📊 Statistics</div>
  <div class="menu-item">✅ Resolved Issues</div>
  <div class="menu-item">🎛️ Filters</div>

</div>

<!-- ISSUE PANEL -->

<div class="issue-panel" id="panel">

  <h3>📌 Report an Issue</h3>

  <div class="type-grid">

    <button class="type-btn" data-type="Pothole">
      <span class="icon">🕳️</span>
      Pothole
    </button>

    <button class="type-btn" data-type="Trash">
      <span class="icon">🗑️</span>
      Trash
    </button>

    <button class="type-btn" data-type="Leak">
      <span class="icon">💧</span>
      Leak
    </button>

    <button class="type-btn" data-type="Light">
      <span class="icon">💡</span>
      Light
    </button>

    <button class="type-btn" data-type="Other">
      <span class="icon">⚠️</span>
      Other
    </button>

  </div>

  <input type="text"
         id="desc"
         placeholder="Describe the issue..."/>

  <label class="photo-label" for="photoInput">
    📷 Upload Photo
  </label>

  <input type="file"
         id="photoInput"
         accept="image/*"
         capture="environment"/>

  <div id="photoPreview">
    <img id="previewImg"/>
    <button id="removePhoto">✕</button>
  </div>

  <div class="panel-actions">

    <button id="cancelBtn">
      Cancel
    </button>

    <button id="submitBtn">
      Submit Report
    </button>

  </div>

</div>

<!-- PHOTO VIEWER -->

<div class="photo-viewer" id="photoViewer">

  <button class="photo-viewer-close"
          id="closeViewer">
    ✕
  </button>

  <img id="viewerImg"/>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc
}
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* =========================
   FIREBASE
========================= */

const firebaseConfig = {
  apiKey: "AIzaSyBT8j239aELPwxD0iQcQj6fdnhQVHNuMLU",
  authDomain: "community-map-125ba.firebaseapp.com",
  projectId: "community-map-125ba",
  storageBucket: "community-map-125ba.firebasestorage.app",
  messagingSenderId:"1016337399487",
  appId: "1:1016337399487:web:77ba8a7b8c89fd850fd00a",
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const reportsRef = collection(db, "reports");

/* =========================
   MAP
========================= */

const map = L.map("map", {
  zoomControl: false
}).setView([-26.2041, 28.0473], 14);

L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  {
    attribution: "&copy; OpenStreetMap"
  }
).addTo(map);

/* =========================
   ICONS
========================= */

const icons = {

  "Pothole": L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/565/565547.png",
    iconSize: [38,38],
    iconAnchor: [19,38]
  }),

  "Trash": L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/484/484662.png",
    iconSize: [38,38],
    iconAnchor: [19,38]
  }),

  "Leak": L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/414/414974.png",
    iconSize: [38,38],
    iconAnchor: [19,38]
  }),

  "Light": L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/565/565654.png",
    iconSize: [38,38],
    iconAnchor: [19,38]
  }),

  "Other": L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/565/565491.png",
    iconSize: [38,38],
    iconAnchor: [19,38]
  })

};

/* =========================
   MENU
========================= */

const menu = document.getElementById("menu");
const overlay = document.getElementById("menuOverlay");

document.getElementById("menuBtn").onclick = () => {

  menu.classList.toggle("open");
  overlay.classList.toggle("show");

};

overlay.onclick = () => {

  menu.classList.remove("open");
  overlay.classList.remove("show");

};

/* =========================
   PHOTO VIEWER
========================= */

const photoViewer = document.getElementById("photoViewer");
const viewerImg = document.getElementById("viewerImg");

window.openPhotoViewer = (src) => {

  viewerImg.src = src;
  photoViewer.classList.add("open");

};

document.getElementById("closeViewer").onclick = () => {

  photoViewer.classList.remove("open");

};

photoViewer.onclick = (e) => {

  if (e.target === photoViewer) {
    photoViewer.classList.remove("open");
  }

};

/* =========================
   USER LOCATION
========================= */

let userMarker = null;
let userCircle = null;

let followMode = true;

const userIcon = L.divIcon({

  className: "user-marker",

  html: `
    <div class="user-arrow-wrapper">
      <div class="user-arrow"></div>
      <div class="user-pulse"></div>
    </div>
  `,

  iconSize: [40,40],
  iconAnchor: [20,20]

});

function smoothMove(marker, newLatLng, duration = 800) {

  const start = marker.getLatLng();

  const startTime = performance.now();

  function animate(time) {

    const progress =
      Math.min((time - startTime) / duration, 1);

    const lat =
      start.lat + (newLatLng.lat - start.lat) * progress;

    const lng =
      start.lng + (newLatLng.lng - start.lng) * progress;

    marker.setLatLng([lat, lng]);

    if (progress < 1) {
      requestAnimationFrame(animate);
    }

  }

  requestAnimationFrame(animate);

}

function startTracking() {

  navigator.geolocation.watchPosition(

    pos => {

      const {
        latitude,
        longitude,
        accuracy,
        heading
      } = pos.coords;

      const latlng = L.latLng(latitude, longitude);

      if (!userMarker) {

        userMarker = L.marker(latlng, {
          icon: userIcon
        }).addTo(map);

        userCircle = L.circle(latlng, {
          radius: accuracy,
          color: "#007bff",
          fillColor: "#007bff",
          fillOpacity: 0.12,
          weight: 1
        }).addTo(map);

      } else {

        smoothMove(userMarker, latlng);

        userCircle.setLatLng(latlng);
        userCircle.setRadius(accuracy);

      }

      if (heading !== null && heading !== undefined) {

        const el = userMarker.getElement();

        if (el) {
          el.style.transform += ` rotate(${heading}deg)`;
        }

      }

      if (followMode) {

        map.flyTo(latlng, 18, {
          duration: 1.5
        });

      }

    },

    err => {

      alert(err.message);

    },

    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 10000
    }

  );

}

document.getElementById("locateBtn").onclick = () => {

  followMode = true;

  startTracking();

};

map.on("dragstart", () => {
  followMode = false;
});

/* =========================
   PHOTO UPLOAD
========================= */

let photoBase64 = null;

const photoInput = document.getElementById("photoInput");
const previewImg = document.getElementById("previewImg");
const photoPreview = document.getElementById("photoPreview");

photoInput.onchange = () => {

  const file = photoInput.files[0];

  if (!file) return;

  const reader = new FileReader();

  reader.onload = (e) => {

    const img = new Image();

    img.onload = () => {

      const canvas = document.createElement("canvas");

      const MAX = 800;

      let w = img.width;
      let h = img.height;

      if (w > h && w > MAX) {
        h = h * MAX / w;
        w = MAX;
      }

      if (h > w && h > MAX) {
        w = w * MAX / h;
        h = MAX;
      }

      canvas.width = w;
      canvas.height = h;

      canvas.getContext("2d")
            .drawImage(img,0,0,w,h);

      photoBase64 =
        canvas.toDataURL("image/jpeg", 0.75);

      previewImg.src = photoBase64;

      photoPreview.style.display = "block";

    };

    img.src = e.target.result;

  };

  reader.readAsDataURL(file);

};

document.getElementById("removePhoto").onclick = () => {

  photoBase64 = null;

  previewImg.src = "";

  photoPreview.style.display = "none";

  photoInput.value = "";

};

/* =========================
   REPORT SYSTEM
========================= */

let pendingLocation = null;
let previewMarker = null;
let selectedType = "Other";

const ownerId =
  localStorage.getItem("ownerId") ||
  crypto.randomUUID();

localStorage.setItem("ownerId", ownerId);

document.querySelectorAll(".type-btn")
.forEach(btn => {

  btn.onclick = () => {

    document.querySelectorAll(".type-btn")
      .forEach(b => b.classList.remove("selected"));

    btn.classList.add("selected");

    selectedType = btn.dataset.type;

  };

});

map.on("click", e => {

  pendingLocation = e.latlng;

  if (previewMarker) {
    map.removeLayer(previewMarker);
  }

  previewMarker = L.marker(e.latlng, {
    opacity: 0.7
  }).addTo(map);

  document.getElementById("panel")
          .classList.add("active");

});

/* =========================
   CANCEL
========================= */

document.getElementById("cancelBtn").onclick = () => {

  document.getElementById("panel")
          .classList.remove("active");

  if (previewMarker) {

    map.removeLayer(previewMarker);

    previewMarker = null;

  }

  pendingLocation = null;

};

/* =========================
   SUBMIT
========================= */

document.getElementById("submitBtn").onclick =
async () => {

  const desc =
    document.getElementById("desc")
            .value.trim();

  if (!desc || !pendingLocation) {

    alert("Please describe the issue.");

    return;

  }

  const btn =
    document.getElementById("submitBtn");

  btn.disabled = true;
  btn.textContent = "Submitting...";

  await addDoc(reportsRef, {

    type: selectedType,

    description: desc,

    lat: pendingLocation.lat,
    lng: pendingLocation.lng,

    photoUrl: photoBase64 || null,

    ownerId,

    timestamp: new Date().toISOString()

  });

  btn.disabled = false;
  btn.textContent = "Submit Report";

  document.getElementById("panel")
          .classList.remove("active");

  if (previewMarker) {

    map.removeLayer(previewMarker);

    previewMarker = null;

  }

  pendingLocation = null;

};

/* =========================
   REALTIME REPORTS
========================= */

const reportMarkers = {};

onSnapshot(reportsRef, snapshot => {

  snapshot.docChanges().forEach(change => {

    const data = change.doc.data();

    const id = change.doc.id;

    if (change.type === "added") {

      let popup = `
        <b>${data.type}</b><br>
        ${data.description}
      `;

      if (data.photoUrl) {

        popup += `
          <img
            class="popup-thumb"
            src="${data.photoUrl}"
            onclick="openPhotoViewer(this.src)"
          />
        `;

      }

      if (data.ownerId === ownerId) {

        popup += `
          <br><br>
          <button onclick="deleteReport('${id}')">
            Delete
          </button>
        `;

      }

      const marker = L.marker(
        [data.lat, data.lng],
        {
          icon:
            icons[data.type] || icons["Other"]
        }
      )
      .addTo(map)
      .bindPopup(popup);

      reportMarkers[id] = marker;

    }

    if (change.type === "removed") {

      if (reportMarkers[id]) {

        map.removeLayer(reportMarkers[id]);

        delete reportMarkers[id];

      }

    }

  });

});

window.deleteReport = async (id) => {

  const confirmDelete =
    confirm("Delete this report?");

  if (!confirmDelete) return;

  await deleteDoc(doc(db, "reports", id));

};

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Community Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { 
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #map { height: 100vh; position: relative; }

    .issue-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      padding: 20px;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
      transform: translateY(100%);
      transition: 0.3s;
      z-index: 1000;
      max-height: 70vh;
      overflow-y: auto;
    }
    .issue-panel.active { transform: translateY(0); }

    .issue-types {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .issue-btn {
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
    }

    .issue-btn.selected {
      border-color: #007bff;
      background: #007bff;
      color: white;
    }

    .issue-icon { font-size: 22px; }

    .description-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 10px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    .submit-btn, .cancel-btn {
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      width: 48%;
    }

    .submit-btn { background: #007bff; color: white; }
    .cancel-btn { background: #eee; }

    .locate-btn {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 25px;
      padding: 12px 18px;
      cursor: pointer;
    }

    .locate-btn.found {
      position: fixed;
      bottom: 25px;
      right: 20px;
      top: auto;
      left: auto;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      padding: 0;
    }
  </style>
</head>

<body>
<div id="map"></div>

<button class="locate-btn" id="locateBtn">📍 Find My Location</button>

<div class="issue-panel" id="issuePanel">
  <h3>Report Issue</h3>

  <div class="issue-types">
    <div class="issue-btn" data-type="Pothole">🕳️ Pothole</div>
    <div class="issue-btn" data-type="Leak">💧 Leak</div>
    <div class="issue-btn" data-type="Trash">🗑️ Trash</div>
    <div class="issue-btn" data-type="Light">💡 Light</div>
  </div>

  <input class="description-input" id="desc" placeholder="Describe issue..."/>

  <div style="display:flex; justify-content:space-between;">
    <button class="submit-btn" id="submitBtn">Submit</button>
    <button class="cancel-btn" id="cancelBtn">Cancel</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

  // 🔥 Firebase config (REPLACE THIS)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const reportsRef = collection(db, "reports");

  // Map
  const map = L.map('map').setView([-26.2041, 28.0473], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  let selectedType = null;
  let pendingLocation = null;
  let userMarker;

  const panel = document.getElementById("issuePanel");

  // 🔄 REAL-TIME SYNC (KEY PART)
  onSnapshot(reportsRef, (snapshot) => {
    map.eachLayer(layer => {
      if (layer instanceof L.Marker) map.removeLayer(layer);
    });

    snapshot.forEach(doc => {
      const r = doc.data();
      const marker = L.marker([r.lat, r.lng]).addTo(map);
      marker.bindPopup(`<b>${r.type}</b><br>${r.description}`);
    });
  });

  // Location
  document.getElementById("locateBtn").onclick = () => {
    navigator.geolocation.getCurrentPosition(pos => {
      const { latitude, longitude } = pos.coords;

      if (userMarker) map.removeLayer(userMarker);

      userMarker = L.circleMarker([latitude, longitude], {
        radius: 8
      }).addTo(map).bindPopup("You are here");

      map.setView([latitude, longitude], 15);
    });
  };

  // Select type
  document.querySelectorAll(".issue-btn").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll(".issue-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedType = btn.dataset.type;
    };
  });

  // Map click
  map.on("click", e => {
    pendingLocation = e.latlng;
    panel.classList.add("active");
  });

  // Submit
  document.getElementById("submitBtn").onclick = async () => {
    const desc = document.getElementById("desc").value;

    if (!selectedType || !desc || !pendingLocation) {
      alert("Fill all fields");
      return;
    }

    await addDoc(reportsRef, {
      type: selectedType,
      description: desc,
      lat: pendingLocation.lat,
      lng: pendingLocation.lng,
      timestamp: new Date().toISOString()
    });

    panel.classList.remove("active");
    document.getElementById("desc").value = "";
    selectedType = null;
    pendingLocation = null;
  };

  document.getElementById("cancelBtn").onclick = () => {
    panel.classList.remove("active");
  };

</script>
</body>
</html>
